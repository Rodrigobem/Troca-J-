<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Troca Já</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0d0d14;color:#f0ede8;font-family:'DM Sans',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:4px}
.inp{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 14px;color:#f0ede8;font-size:14px;width:100%;outline:none;font-family:'DM Sans',sans-serif;transition:border-color .2s;resize:vertical}
.inp:focus{border-color:rgba(251,191,36,.5)}.inp::placeholder{color:rgba(255,255,255,.22)}
select.inp option{background:#12121f}
.btn{border:none;border-radius:12px;padding:10px 20px;font-weight:700;cursor:pointer;font-size:13px;transition:all .2s;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.gold{background:linear-gradient(135deg,#fbbf24,#f97316);color:#1a0500}.gold:hover{filter:brightness(1.08);transform:translateY(-1px)}.gold:disabled{opacity:.4;transform:none;cursor:not-allowed}
.ghost{background:rgba(255,255,255,.07);color:#f0ede8;border:1px solid rgba(255,255,255,.12)}.ghost:hover{background:rgba(255,255,255,.13)}
.danger{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.22)}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:16px}
.card-h{transition:all .2s}.card-h:hover{background:rgba(255,255,255,.07);border-color:rgba(251,191,36,.15);transform:translateY(-1px)}
.tab{background:none;border:none;padding:8px 10px;cursor:pointer;font-size:11px;border-radius:10px;color:rgba(255,255,255,.36);font-family:'DM Sans',sans-serif;font-weight:600;display:flex;align-items:center;gap:4px;white-space:nowrap;transition:all .2s;position:relative}
.tab.on{background:rgba(251,191,36,.12);color:#fbbf24}.tab:hover:not(.on){color:rgba(255,255,255,.7)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(8px)}
.mb{background:#12121f;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:24px;max-width:500px;width:95%;max-height:92vh;overflow-y:auto}
.mb-wide{max-width:580px}
.mb-chat{max-width:480px;padding:0;overflow:hidden;display:flex;flex-direction:column;height:88vh;max-height:580px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:11px 22px;border-radius:12px;font-size:13px;font-weight:600;z-index:500;font-family:'DM Sans',sans-serif;white-space:nowrap;animation:tup .3s ease;box-shadow:0 8px 30px rgba(0,0,0,.4)}
@keyframes tup{from{opacity:0;transform:translateX(-50%) translateY(14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.badge-n{position:absolute;top:-3px;right:-3px;background:#ef4444;color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;border:1.5px solid #0d0d14}
.msg-me{background:linear-gradient(135deg,rgba(251,191,36,.22),rgba(249,115,22,.18));border:1px solid rgba(251,191,36,.18);border-bottom-right-radius:4px;align-self:flex-end;color:#f0ede8}
.msg-other{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-bottom-left-radius:4px;align-self:flex-start;color:#f0ede8}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.upload-zone{border:2px dashed rgba(255,255,255,.12);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover{border-color:rgba(251,191,36,.4);background:rgba(251,191,36,.04)}
.ping{animation:ping 2s ease-in-out infinite}
@keyframes ping{0%,100%{opacity:.4}50%{opacity:1}}
.playfair{font-family:'Playfair Display',serif}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo}=React;

// ── Supabase config ──────────────────────────────────────────────────────────
const SB_URL="https://juolnarxljxexlgyxfof.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp1b2xuYXJ4bGp4ZXhsZ3l4Zm9mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MDA5NjAsImV4cCI6MjA5MjQ3Njk2MH0.4S4s_3TyDHELt1UuH-0tBCoD8AR8-wdO_kc9YkpUe9s";

const sbFetch=async(method,table,qs="",body=null)=>{
  try{
    const url=`${SB_URL}/rest/v1/${table}${qs?"?"+qs:""}`;
    const res=await fetch(url,{method,headers:{"apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`,"Content-Type":"application/json","Accept":"application/json",...(method!=="GET"?{"Prefer":"return=representation"}:{})},
    ...(body?{body:JSON.stringify(body)}:{})});
    const txt=await res.text();
    if(!res.ok){console.error(`[SB] ${method} ${table} ${res.status}:`,txt.slice(0,200));return null}
    return txt?JSON.parse(txt):[];
  }catch(e){console.error(`[SB]`,e.message);return null}
};
const db={
  list:(t,q="")=>sbFetch("GET",t,(q?"&":"")+"order=created_at.asc"+(q?","+q:"")),
  insert:(t,d)=>sbFetch("POST",t,"",d).then(r=>Array.isArray(r)?r[0]:r),
  update:(t,q,d)=>sbFetch("PATCH",t,q,d),
  remove:(t,q)=>sbFetch("DELETE",t,q),
};

// ── Constants ────────────────────────────────────────────────────────────────
const TAXA=0.05,JUROS=0.03,LIMITE=200,M="₮";
const NIVEIS=[
  {nome:"Iniciante",min:0,cor:"#94a3b8",icon:"🌱"},
  {nome:"Explorador",min:100,cor:"#3b82f6",icon:"🔍"},
  {nome:"Negociante",min:300,cor:"#a855f7",icon:"🤝"},
  {nome:"Expert",min:700,cor:"#f97316",icon:"⭐"},
  {nome:"Lenda",min:1500,cor:"#fbbf24",icon:"👑"},
];
const BADGES=[
  {id:"primeiro_item",nome:"Publicador",icon:"📦",xp:30},
  {id:"primeira_venda",nome:"Primeira Venda",icon:"🏷️",xp:100},
  {id:"cinco_vendas",nome:"Negociante",icon:"🤝",xp:150},
  {id:"nota_maxima",nome:"5 Estrelas",icon:"⭐",xp:80},
  {id:"nacional",nome:"Viajante",icon:"🌐",xp:100},
  {id:"avaliador",nome:"Avaliador",icon:"📝",xp:50},
];
const CATS=["Eletrônicos","Esportes","Acessórios","Moda","Casa","Livros","Arte","Música","Outros"];
const EMOJIS=["📦","📱","💻","🎮","🚲","⌚","👟","👜","📺","🎸","📚","🛋️","🌿","🛴","🖥️","🍳","📷","🎯"];
const BANCOS=["Nubank","Itaú","Bradesco","Santander","Banco do Brasil","Caixa Econômica","Inter","C6 Bank","Outro"];

// ── Helpers ──────────────────────────────────────────────────────────────────
const fmtCard=v=>v.replace(/\D/g,"").slice(0,16).replace(/(.{4})/g,"$1 ").trim();
const fmtExp=v=>{const n=v.replace(/\D/g,"").slice(0,4);return n.length>2?n.slice(0,2)+"/"+n.slice(2):n};
const fmtCPF=v=>v.replace(/\D/g,"").slice(0,11).replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,"$1.$2.$3-$4");
const fmtTel=v=>{const n=v.replace(/\D/g,"").slice(0,11);return n.replace(/(\d{2})(\d{5})(\d{4})/,"($1)$2-$3")};
const maskCard=n=>"•••• •••• •••• "+((n||"").replace(/\s/g,"").slice(-4)||"????");
const disp=u=>(u?.saldo||0)+(u?.limite||LIMITE);
const jMes=u=>(u?.saldo||0)<0?parseFloat((Math.abs(u.saldo)*JUROS).toFixed(2)):0;
const inits=n=>(n||"?").split(" ").slice(0,2).map(p=>p[0]).join("").toUpperCase();
const getNivel=xp=>[...NIVEIS].reverse().find(n=>xp>=n.min)||NIVEIS[0];
const uid_gen=()=>`${Date.now()}-${Math.random().toString(36).slice(2,8)}`;
const readFile=f=>new Promise(res=>{const r=new FileReader();r.onload=e=>res({url:e.target.result,type:f.type.startsWith("video")?"video":"image"});r.readAsDataURL(f)});

// Taxa split: 5% total = franqueadora 3% + franqueados 2%
// Mesmo condo: franqueado recebe 2%; Condo diferente: cada franqueado 1%
const calcTaxas=(preco,nacional)=>{
  const total=Math.round(preco*0.05);
  const franqueadora=Math.round(preco*0.03);
  const franqueados=total-franqueadora; // 2%
  return{total,franqueadora,franqueado_comprador:nacional?Math.round(preco*0.01):franqueados,franqueado_vendedor:nacional?Math.round(preco*0.01):0};
};

// Export to CSV
const exportCSV=(rows,filename)=>{
  const cols=Object.keys(rows[0]);
  const csv=[cols.join(","),...rows.map(r=>cols.map(c=>`"${(r[c]||"").toString().replace(/"/g,'""')}"`).join(","))].join("\n");
  const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download=filename;a.click();
};

// Share product
const shareProduct=(p,condoNome)=>{
  const url=window.location.href;
  const txt=`🏡 *${p.nome}* por ${M}${p.preco}\n${p.descricao||""}\n\n📍 ${condoNome} — Troca Já\n👉 ${url}`;
  if(navigator.share){navigator.share({title:p.nome,text:txt,url}).catch(()=>{})}
  else{const wa=`https://wa.me/?text=${encodeURIComponent(txt)}`;window.open(wa,"_blank")}
};

// ── Atoms ────────────────────────────────────────────────────────────────────
const Av=({u,size=32,onClick})=>u?.foto
  ?<img src={u.foto} alt="" onClick={onClick} style={{width:size,height:size,borderRadius:"50%",objectFit:"cover",flexShrink:0,cursor:onClick?"pointer":"default"}}/>
  :<div onClick={onClick} style={{width:size,height:size,borderRadius:"50%",background:u?.cor||"#555",display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*.36,fontWeight:700,color:"#fff",flexShrink:0,cursor:onClick?"pointer":"default"}}>{inits(u?.nome)}</div>;

const Stars=({nota,size=13})=><span>{[1,2,3,4,5].map(i=><span key={i} style={{fontSize:size,color:i<=Math.round(nota)?"#fbbf24":"rgba(255,255,255,.2)"}}>{i<=Math.round(nota)?"★":"☆"}</span>)}</span>;
const Pill=({children,fg="rgba(255,255,255,.5)",bg="rgba(255,255,255,.08)"})=><span style={{background:bg,color:fg,padding:"2px 9px",borderRadius:20,fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{children}</span>;
const Row=({l,v,bold,accent,last})=><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:last?"none":"1px solid rgba(255,255,255,.05)"}}><span style={{fontSize:13,color:"rgba(255,255,255,.42)"}}>{l}</span><span style={{fontSize:bold?15:13,fontWeight:bold?700:500,color:accent||"#f0ede8",fontFamily:bold?"'Playfair Display',serif":"inherit"}}>{v}</span></div>;
const Fld=({label,children,full})=><div style={{gridColumn:full?"span 2":"span 1"}}><div style={{fontSize:11,color:"rgba(255,255,255,.38)",marginBottom:5,letterSpacing:.5,textTransform:"uppercase"}}>{label}</div>{children}</div>;
const StatCard=({icon,label,value,sub,cor="#fbbf24"})=><div className="card" style={{padding:"14px 12px"}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><span style={{fontSize:20}}>{icon}</span><span style={{fontSize:10,color:"rgba(255,255,255,.35)",textTransform:"uppercase",letterSpacing:1}}>{label}</span></div><div className="playfair" style={{fontSize:26,fontWeight:900,color:cor,lineHeight:1}}>{value}</div>{sub&&<div style={{fontSize:11,color:"rgba(255,255,255,.28)",marginTop:3}}>{sub}</div>}</div>;

// ════════════════════════════════════════════════════════════════════════════
function App(){
  const [condos,setCondos]=useState([]);
  const [users,setUsers]=useState([]);
  const [prods,setProds]=useState([]);
  const [trans,setTrans]=useState([]);
  const [convs,setConvs]=useState([]);
  const [notifs,setNotifs]=useState([]);
  const [uid,setUid]=useState(null);
  const [screen,setScreen]=useState("landing");
  const [aba,setAba]=useState("condo");
  const [status,setStatus]=useState("loading");
  const [errMsg,setErrMsg]=useState("");
  const [modal,setModal]=useState(null);
  const [toast,setToast]=useState(null);
  const [showNotifs,setShowNotifs]=useState(false);
  const [lpTab,setLpTab]=useState("home");
  const [fqPass,setFqPass]=useState("");
  const [contaAba,setContaAba]=useState("resumo");
  const [adminSub,setAdminSub]=useState("dash");
  const [fqSub,setFqSub]=useState("dashboard");
  const [novoCondo,setNovoCondo]=useState({nome:"",cidade:"",estado:""});
  const [condoSel,setCondoSel]=useState(null);
  const [ajLimFranq,setAjLimFranq]=useState(null);
  const [ajLimVal,setAjLimVal]=useState("");

  // Modal state
  const [avNota,setAvNota]=useState(5);
  const [avComment,setAvComment]=useState("");
  const [cfNum,setCfNum]=useState("");
  const [cfNome2,setCfNome2]=useState("");
  const [cfVal,setCfVal]=useState("");
  const [cfCvv,setCfCvv]=useState("");
  const [cfShow,setCfShow]=useState(false);
  const [limVal,setLimVal]=useState("");
  const [epNome,setEpNome]=useState("");
  const [epBio,setEpBio]=useState("");
  const [epFoto,setEpFoto]=useState(null);
  const [novoProd,setNovoProd]=useState({nome:"",desc:"",preco:"",cat:"Outros",emoji:"📦",midias:[]});
  const [convAtiva,setConvAtiva]=useState(null);
  const [msgText,setMsgText]=useState("");
  const [lightbox,setLightbox]=useState(null);
  const [regStep,setRegStep]=useState(1);
  const [regType,setRegType]=useState("morador");
  const [reg,setReg]=useState({nome:"",email:"",cpf:"",tel:"",bio:"",foto:null,unidade:"",condoId:"",novoCondominio:false,condoNova:"",cidadeNova:"",estadoNova:"",cardNum:"",cardNome:"",cardVal:"",cardCvv:"",showCvv:false,pixTipo:"cpf",pixChave:"",pixBanco:"",lgpd_pub:false,lgpd_contato:false,lgpd_dados:false});
  const msgsEnd=useRef(null);

  useEffect(()=>{
    if(!modal)return;
    if(modal.tipo==="avaliar"){setAvNota(5);setAvComment("")}
    if(modal.tipo==="cartao"){setCfNum("");setCfNome2("");setCfVal("");setCfCvv("");setCfShow(false)}
    if(modal.tipo==="ajusteLimite")setLimVal(String(modal.atual||""));
    if(modal.tipo==="editarPerfil"){setEpNome(me?.nome||"");setEpBio(me?.bio||"");setEpFoto(me?.foto||null)}
  },[modal?.tipo]);

  useEffect(()=>{msgsEnd.current?.scrollIntoView({behavior:"smooth"})},[convAtiva,convs]);

  const me=useMemo(()=>users.find(u=>u.id===uid),[users,uid]);
  const myCondo=useMemo(()=>condos.find(c=>c.id===me?.condo_id),[condos,me]);
  const meDisp=me?disp(me):0;
  const meusProd=useMemo(()=>prods.filter(p=>p.vendedor_id===uid&&p.status==="disponivel"),[prods,uid]);
  const condoProd=useMemo(()=>prods.filter(p=>p.condo_id===me?.condo_id&&p.vendedor_id!==uid&&p.status==="disponivel"),[prods,me,uid]);
  const nacProd=useMemo(()=>prods.filter(p=>p.condo_id!==me?.condo_id&&p.status==="disponivel"),[prods,me]);
  const myConvs=useMemo(()=>convs.filter(c=>c.entre?.includes(uid)),[convs,uid]);
  const myNotifs=useMemo(()=>notifs.filter(n=>n.user_id===uid),[notifs,uid]);
  const unreadMsg=useMemo(()=>myConvs.reduce((a,c)=>a+(c.msgs||[]).filter(m=>m.de_id!==uid&&!m.lido).length,0),[myConvs,uid]);
  const unreadNot=useMemo(()=>myNotifs.filter(n=>!n.lido).length,[myNotifs]);
  const myTrans=useMemo(()=>trans.filter(t=>t.comprador_id===uid||t.vendedor_id===uid),[trans,uid]);
  const myRatings=useMemo(()=>trans.filter(t=>t.vendedor_id===uid&&t.avaliacao).map(t=>t.avaliacao),[trans,uid]);
  const avgRating=myRatings.length?(myRatings.reduce((a,b)=>a+(b.nota||0),0)/myRatings.length).toFixed(1):null;
  const nivel=getNivel(me?.xp||0);

  const loadAll=async()=>{
    setStatus("loading");setErrMsg("");
    try{
      const test=await sbFetch("GET","condos","limit=1");
      if(test===null){setErrMsg("Não foi possível conectar. Verifique se o SQL foi executado no Supabase.");setStatus("error");return}
      const [cs,us,ps,ts,cvs,ms,ns]=await Promise.all([db.list("condos"),db.list("usuarios"),db.list("produtos"),db.list("transacoes"),db.list("conversas"),db.list("mensagens"),db.list("notificacoes")]);
      const ch=(cvs||[]).map(c=>({...c,msgs:(ms||[]).filter(m=>m.conv_id===c.id)}));
      setCondos(cs||[]);setUsers(us||[]);setProds(ps||[]);setTrans(ts||[]);setConvs(ch);setNotifs(ns||[]);
      setStatus("ready");
    }catch(e){setErrMsg("Erro: "+e.message);setStatus("error")}
  };

  useEffect(()=>{loadAll()},[]);

  useEffect(()=>{
    if(status!=="ready"||!uid)return;
    const tick=async()=>{
      const[ms,ns,ps]=await Promise.all([db.list("mensagens"),sbFetch("GET","notificacoes",`user_id=eq.${uid}&order=created_at.desc`),db.list("produtos")]);
      if(ms)setConvs(prev=>prev.map(c=>({...c,msgs:ms.filter(m=>m.conv_id===c.id)})));
      if(ns)setNotifs(prev=>{const old=prev.filter(n=>n.user_id!==uid);return[...old,...ns]});
      if(ps)setProds(ps);
    };
    const id=setInterval(tick,10000);
    return()=>clearInterval(id);
  },[status,uid]);

  const showToast=(msg,tipo="ok")=>{setToast({msg,tipo});setTimeout(()=>setToast(null),3000)};
  const updateUser=async(id,patch)=>{setUsers(prev=>prev.map(u=>u.id===id?{...u,...patch}:u));await db.update("usuarios",`id=eq.${id}`,patch)};
  const addNotif=async(userId,tipo,texto,icon="🔔")=>{const n={id:uid_gen(),user_id:userId,tipo,texto,icon,lido:false};setNotifs(prev=>[n,...prev]);await db.insert("notificacoes",n)};
  const addXP=async(userId,xp,badgeId=null)=>{const u=users.find(x=>x.id===userId);if(!u)return;const newXp=(u.xp||0)+xp;const newBadges=badgeId&&!(u.badges||[]).includes(badgeId)?[...(u.badges||[]),badgeId]:(u.badges||[]);await updateUser(userId,{xp:newXp,badges:newBadges})};
  const login=id=>{
    const u=users.find(x=>x.id===id);
    if(u?.status_conta==="pendente"){showToast("Cadastro aguardando aprovação do administrador","err");return}
    if(u?.status_conta==="rejeitado"){showToast("Cadastro recusado. Entre em contato com o administrador","err");return}
    setUid(id);setScreen("app");setAba("condo");setModal(null)
  };

  const comprar=async(p)=>{
    const nacional=p.condo_id!==me.condo_id;
    const {total,franqueadora,franqueado_comprador,franqueado_vendedor}=calcTaxas(p.preco,nacional);
    if(meDisp<p.preco+total){showToast("Limite insuficiente!","err");setModal(null);return}
    const novoSaldo=(me.saldo||0)-(p.preco+total);
    const vendedor=users.find(u=>u.id===p.vendedor_id);
    // Franqueados
    const franqComprador=users.find(u=>u.condo_id===me.condo_id&&u.role==="franqueado");
    const franqVendedor=users.find(u=>u.condo_id===p.condo_id&&u.role==="franqueado");
    setUsers(prev=>prev.map(u=>{
      if(u.id===uid)return{...u,saldo:novoSaldo};
      if(u.id===p.vendedor_id)return{...u,saldo:(u.saldo||0)+p.preco};
      return u;
    }));
    setProds(prev=>prev.map(x=>x.id===p.id?{...x,status:"vendido"}:x));
    const novaT={id:uid_gen(),prod_id:p.id,prod_nome:p.nome,prod_emoji:p.emoji,
      comprador_id:uid,vendedor_id:p.vendedor_id,condo_id:p.condo_id,
      valor:p.preco,taxa:total,taxa_franqueadora:franqueadora,
      taxa_franqueado_comprador:franqueado_comprador,taxa_franqueado_vendedor:franqueado_vendedor,
      nacional,avaliacao:null};
    setTrans(prev=>[novaT,...prev]);
    await Promise.all([
      db.update("usuarios",`id=eq.${uid}`,{saldo:novoSaldo}),
      db.update("usuarios",`id=eq.${p.vendedor_id}`,{saldo:(vendedor?.saldo||0)+p.preco}),
      db.update("produtos",`id=eq.${p.id}`,{status:"vendido"}),
      db.insert("transacoes",novaT),
    ]);

                  <div style={{fontSize:9,color:"rgba(255,255,255,.2)"}}>{m.de_id===uid&&<span style={{marginRight:3}}>{m.lido?"✓✓":"✓"}</span>}</div>
                </div>
              ))}
              <div ref={msgsEnd}/>
            </div>
            <div style={{padding:"10px 12px",borderTop:"1px solid rgba(255,255,255,.08)",display:"flex",gap:8,flexShrink:0,background:"#12121f"}}>
              <input className="inp" placeholder="Mensagem..." value={msgText} onChange={e=>setMsgText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&enviarMsg()} style={{flex:1}}/>
              <button className="btn gold" style={{padding:"10px 14px"}} onClick={enviarMsg} disabled={!msgText.trim()}>→</button>
            </div>
          </div>
        </div>);
      })()}

      {modal?.tipo==="compra"&&(()=>{
        const p=modal.p;
        const nacional=p.condo_id!==me?.condo_id;
        const {total,franqueadora,franqueado_comprador,franqueado_vendedor}=calcTaxas(p.preco,nacional);
        const ns=(me?.saldo||0)-(p.preco+total);
        return(<div className="ov" onClick={()=>setModal(null)}>
          <div className="mb" onClick={e=>e.stopPropagation()}>
            {p.midias?.length>0?<img src={p.midias[0].url} alt="" style={{width:"100%",height:150,objectFit:"cover",borderRadius:12,marginBottom:14}}/>:<div style={{textAlign:"center",fontSize:44,marginBottom:12}}>{p.emoji}</div>}
            <h3 className="playfair" style={{fontSize:18,marginBottom:5,textAlign:"center"}}>{p.nome}</h3>
            <div className="card" style={{padding:14,marginBottom:10}}>
              <Row l="Preço do item" v={`${M}${p.preco}`}/>
              <Row l={`Taxa plataforma (5%)`} v={`${M}${total}`} bold accent="#fbbf24"/>
              <div style={{background:"rgba(255,255,255,.03)",borderRadius:8,padding:"8px 10px",margin:"6px 0",fontSize:11,color:"rgba(255,255,255,.4)"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span>↳ Franqueadora (3%)</span><span>R${franqueadora.toFixed(0)} cobrado no cartão</span></div>
                {nacional
                  ?<><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span>↳ Franqueado comprador (1%)</span><span>R${franqueado_comprador.toFixed(0)}</span></div>
                    <div style={{display:"flex",justifyContent:"space-between"}}><span>↳ Franqueado vendedor (1%)</span><span>R${franqueado_vendedor.toFixed(0)}</span></div></>
                  :<div style={{display:"flex",justifyContent:"space-between"}}><span>↳ Franqueado do condo (2%)</span><span>R${franqueado_comprador.toFixed(0)}</span></div>
                }
              </div>
              <Row l="Saldo atual" v={`${M}${(me?.saldo||0).toFixed(2)}`}/>
              <Row l="Saldo após compra" v={`${M}${ns.toFixed(2)}`} bold accent={ns<0?"#f87171":"#86efac"} last/>
            </div>
            {ns<0&&<div style={{background:"rgba(251,191,36,.06)",border:"1px solid rgba(251,191,36,.15)",borderRadius:10,padding:10,marginBottom:12,fontSize:12,color:"rgba(251,191,36,.8)",lineHeight:1.6}}>⚠️ Usará {M}{Math.abs(ns).toFixed(0)} do limite. Juros 3%/mês.</div>}
            <div style={{display:"flex",gap:10}}><button className="btn ghost" style={{flex:1}} onClick={()=>setModal(null)}>Cancelar</button><button className="btn gold" style={{flex:2}} onClick={()=>comprar(p)}>Confirmar</button></div>
          </div>
        </div>);
      })()}

      {modal?.tipo==="avaliar"&&(
        <div className="ov"><div className="mb" onClick={e=>e.stopPropagation()}>
          <h3 className="playfair" style={{fontSize:20,marginBottom:5}}>⭐ Avaliar</h3>
          <div style={{fontSize:12,color:"rgba(255,255,255,.38)",marginBottom:18}}>Como foi a compra de <strong>"{modal.prodNome}"</strong>?</div>
          <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:16}}>
            {[1,2,3,4,5].map(n=><button key={n} onClick={()=>setAvNota(n)} style={{background:"none",border:"none",cursor:"pointer",fontSize:36,opacity:n<=avNota?1:.25,transition:"all .15s",transform:n<=avNota?"scale(1.1)":"scale(1)"}}>★</button>)}
          </div>
          <div style={{textAlign:"center",fontSize:13,color:"rgba(251,191,36,.8)",marginBottom:14}}>{["","Muito ruim","Ruim","Regular","Bom","Excelente!"][avNota]}</div>
          <textarea className="inp" rows={2} placeholder="Comentário..." value={avComment} onChange={e=>setAvComment(e.target.value)} style={{marginBottom:14}}/>
          <div style={{display:"flex",gap:10}}><button className="btn ghost" style={{flex:1}} onClick={()=>setModal(null)}>Pular</button><button className="btn gold" style={{flex:2}} onClick={()=>submitAvaliacao(modal.transId,avNota,avComment||"Sem comentário")}>Enviar</button></div>
        </div></div>
      )}

      {modal?.tipo==="produto"&&(
        <div className="ov" onClick={()=>setModal(null)}>
          <div className="mb mb-wide" onClick={e=>e.stopPropagation()}>
            <h3 className="playfair" style={{fontSize:20,marginBottom:16}}>📦 Publicar Item</h3>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:11,color:"rgba(255,255,255,.38)",marginBottom:8,letterSpacing:.5,textTransform:"uppercase"}}>Fotos & Vídeos</div>
              {novoProd.midias?.length>0&&<div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>{novoProd.midias.map((m,i)=><div key={i} style={{position:"relative"}}>{m.type==="video"?<video src={m.url} style={{width:72,height:72,borderRadius:10,objectFit:"cover"}} muted/>:<img src={m.url} style={{width:72,height:72,borderRadius:10,objectFit:"cover"}} alt=""/>}<button onClick={()=>setNovoProd(p=>({...p,midias:p.midias.filter((_,j)=>j!==i)}))} style={{position:"absolute",top:-4,right:-4,background:"#ef4444",border:"none",borderRadius:"50%",width:18,height:18,color:"#fff",cursor:"pointer",fontSize:10,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button></div>)}</div>}
              <label><div className="upload-zone"><div style={{fontSize:26,marginBottom:5}}>📸</div><div style={{fontWeight:600,fontSize:13,color:"rgba(255,255,255,.55)",marginBottom:3}}>Adicionar fotos ou vídeos</div><div style={{fontSize:11,color:"rgba(255,255,255,.28)"}}>JPG, PNG, MP4</div></div><input type="file" accept="image/*,video/*" multiple style={{display:"none"}} onChange={async e=>{const files=Array.from(e.target.files);const loaded=await Promise.all(files.map(readFile));setNovoProd(p=>({...p,midias:[...(p.midias||[]),...loaded]}))}}/></label>
            </div>
            <div className="g2">
              <Fld label="Ícone"><div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:3}}>{EMOJIS.slice(0,12).map(e=><button key={e} onClick={()=>setNovoProd(p=>({...p,emoji:e}))} style={{fontSize:18,background:novoProd.emoji===e?"rgba(251,191,36,.18)":"rgba(255,255,255,.05)",border:novoProd.emoji===e?"2px solid rgba(251,191,36,.5)":"2px solid transparent",borderRadius:8,padding:"3px 6px",cursor:"pointer"}}>{e}</button>)}</div></Fld>
              <Fld label="Nome *" full><input className="inp" placeholder="Nome do item" value={novoProd.nome} onChange={e=>setNovoProd(p=>({...p,nome:e.target.value}))}/></Fld>
              <Fld label="Descrição" full><textarea className="inp" rows={2} placeholder="Estado, detalhes..." value={novoProd.desc} onChange={e=>setNovoProd(p=>({...p,desc:e.target.value}))}/></Fld>
              <Fld label="Preço *"><input className="inp" type="number" placeholder="200" value={novoProd.preco} onChange={e=>setNovoProd(p=>({...p,preco:e.target.value}))}/></Fld>
              <Fld label="Categoria"><select className="inp" value={novoProd.cat} onChange={e=>setNovoProd(p=>({...p,cat:e.target.value}))}>{CATS.map(c=><option key={c}>{c}</option>)}</select></Fld>
            </div>
            <div style={{display:"flex",gap:10,marginTop:16}}>
              <button className="btn ghost" style={{flex:1}} onClick={()=>setModal(null)}>Cancelar</button>
              <button className="btn gold" style={{flex:2}} onClick={publicar} disabled={!novoProd.nome||!novoProd.preco}>Publicar +15 XP</button>
            </div>
          </div>
        </div>
      )}

      {modal?.tipo==="editarPerfil"&&(
        <div className="ov" onClick={()=>setModal(null)}>
          <div className="mb" onClick={e=>e.stopPropagation()}>
            <h3 className="playfair" style={{fontSize:20,marginBottom:18}}>✏️ Editar Perfil</h3>
            <div style={{display:"flex",justifyContent:"center",marginBottom:18}}>
              <label style={{cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
                <div style={{width:80,height:80,borderRadius:"50%",border:"2px dashed rgba(251,191,36,.4)",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(255,255,255,.04)"}}>
                  {epFoto?<img src={epFoto} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<div style={{textAlign:"center",fontSize:24}}>📷</div>}
                </div>
                <input type="file" accept="image/*" style={{display:"none"}} onChange={async e=>{if(e.target.files[0]){const d=await readFile(e.target.files[0]);setEpFoto(d.url)}}}/>
                <span style={{fontSize:11,color:"rgba(251,191,36,.6)"}}>Trocar foto</span>
              </label>
            </div>
            <div style={{display:"grid",gap:12}}>
              <Fld label="Nome" full><input className="inp" value={epNome} onChange={e=>setEpNome(e.target.value)}/></Fld>
              <Fld label="Bio" full><textarea className="inp" rows={3} placeholder="Fale sobre você..." value={epBio} onChange={e=>setEpBio(e.target.value)}/></Fld>
            </div>
            <div style={{display:"flex",gap:10,marginTop:16}}>
              <button className="btn ghost" style={{flex:1}} onClick={()=>setModal(null)}>Cancelar</button>
              <button className="btn gold" style={{flex:2}} onClick={async()=>{await updateUser(uid,{nome:epNome,bio:epBio,foto:epFoto});setModal(null);showToast("✅ Perfil atualizado!")}}>Salvar</button>
            </div>
          </div>
        </div>
      )}

      {modal?.tipo==="perfilUsuario"&&(()=>{
        const pu=users.find(u=>u.id===modal.userId),pnv=getNivel(pu?.xp||0),pc=condos.find(c=>c.id===pu?.condo_id);
        const puR=trans.filter(t=>t.vendedor_id===modal.userId&&t.avaliacao).map(t=>t.avaliacao);
        const puAvg=puR.length?(puR.reduce((a,b)=>a+(b.nota||0),0)/puR.length).toFixed(1):null;
        const puProds=prods.filter(p=>p.vendedor_id===modal.userId&&p.status==="disponivel");
        return(<div className="ov" onClick={()=>setModal(null)}>
          <div className="mb" style={{maxWidth:400}} onClick={e=>e.stopPropagation()}>
            <div style={{textAlign:"center",marginBottom:16}}>
              <Av u={pu} size={70}/>
              <div className="playfair" style={{fontSize:20,fontWeight:700,marginTop:10,marginBottom:3}}>{pu?.nome}</div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginBottom:4}}><span style={{fontSize:18}}>{pnv.icon}</span><span style={{fontSize:13,color:pnv.cor,fontWeight:700}}>{pnv.nome}</span></div>
              <div style={{fontSize:11,color:"rgba(255,255,255,.38)",marginBottom:4}}>🏢 {pc?.nome}·{pc?.estado}</div>
              {puAvg&&<div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:5}}><Stars nota={parseFloat(puAvg)}/><span style={{fontSize:11,color:"rgba(255,255,255,.45)"}}>{puAvg}</span></div>}
              {pu?.bio&&<div style={{fontSize:12,color:"rgba(255,255,255,.5)",fontStyle:"italic",marginTop:8}}>"{pu.bio}"</div>}
            </div>
            {puProds.length>0&&<div style={{marginBottom:14}}>{puProds.slice(0,3).map(p=><div key={p.id} onClick={()=>setModal({tipo:"compra",p})} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",background:"rgba(255,255,255,.04)",borderRadius:10,marginBottom:6,cursor:"pointer"}}><span style={{fontSize:20}}>{p.emoji}</span><div style={{flex:1,fontSize:12,fontWeight:600}}>{p.nome}</div><div className="playfair" style={{fontSize:14,color:"#fbbf24",fontWeight:700}}>{M}{p.preco}</div></div>)}</div>}
            <button className="btn ghost" style={{width:"100%"}} onClick={()=>setModal(null)}>Fechar</button>
          </div>
        </div>);
      })()}

      {modal?.tipo==="cartao"&&(
        <div className="ov" onClick={()=>setModal(null)}>
          <div className="mb" onClick={e=>e.stopPropagation()}>
            <h3 className="playfair" style={{fontSize:20,marginBottom:18}}>Cadastrar Cartão</h3>
            <div className="g2">
              <Fld label="Número *" full><input className="inp" placeholder="0000 0000 0000 0000" value={cfNum} onChange={e=>setCfNum(fmtCard(e.target.value))} maxLength={19}/></Fld>
              <Fld label="Nome *" full><input className="inp" placeholder="NOME SOBRENOME" value={cfNome2} onChange={e=>setCfNome2(e.target.value.toUpperCase())}/></Fld>
              <Fld label="Validade *"><input className="inp" placeholder="MM/AA" value={cfVal} onChange={e=>setCfVal(fmtExp(e.target.value))} maxLength={5}/></Fld>
              <Fld label="CVV *"><div style={{position:"relative"}}><input className="inp" type={cfShow?"text":"password"} placeholder="•••" value={cfCvv} onChange={e=>setCfCvv(e.target.value.replace(/\D/g,"").slice(0,4))}/><button onClick={()=>setCfShow(v=>!v)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,.35)",fontSize:14}}>{cfShow?"🙈":"👁"}</button></div></Fld>
            </div>
            <div style={{display:"flex",gap:10,marginTop:16}}>
              <button className="btn ghost" style={{flex:1}} onClick={()=>setModal(null)}>Cancelar</button>
              <button className="btn gold" style={{flex:2}} disabled={cfNum.replace(/\s/g,"").length<16||!cfNome2||cfVal.length<5||cfCvv.length<3} onClick={async()=>{await updateUser(uid,{cartao:{numero:cfNum.replace(/\s/g,""),nome:cfNome2,validade:cfVal}});setModal(null);showToast("💳 Cadastrado!")}}>Salvar</button>
            </div>
          </div>
        </div>
      )}

      {modal?.tipo==="ajusteLimite"&&(
        <div className="ov" onClick={()=>setModal(null)}>
          <div className="mb" style={{maxWidth:360}} onClick={e=>e.stopPropagation()}>
            <h3 className="playfair" style={{fontSize:18,marginBottom:5}}>Ajustar Limite</h3>
            <div style={{fontSize:12,color:"rgba(255,255,255,.38)",marginBottom:12}}>{users.find(u=>u.id===modal.userId)?.nome} · atual: {M}{modal.atual}</div>
            <input className="inp" type="number" value={limVal} onChange={e=>setLimVal(e.target.value)} style={{marginBottom:10}}/>
            <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>{[50,100,200,300,500,1000].map(v=><button key={v} className="btn ghost" style={{fontSize:11,padding:"5px 10px",background:limVal==v?"rgba(251,191,36,.14)":undefined}} onClick={()=>setLimVal(String(v))}>{M}{v}</button>)}</div>
            <div style={{display:"flex",gap:10}}>
              <button className="btn ghost" style={{flex:1}} onClick={()=>setModal(null)}>Cancelar</button>
              <button className="btn gold" style={{flex:2}} disabled={!parseInt(limVal)||parseInt(limVal)<0} onClick={async()=>{await updateUser(modal.userId,{limite:parseInt(limVal)});setModal(null);showToast(`Limite → ${M}${limVal}`)}}>Salvar</button>
            </div>
          </div>
        </div>
      )}

      <div style={{position:"fixed",bottom:14,right:14,display:"flex",alignItems:"center",gap:7,background:"rgba(16,185,129,.1)",border:"1px solid rgba(16,185,129,.22)",borderRadius:20,padding:"5px 12px",zIndex:50}}>
        <div style={{width:6,height:6,borderRadius:"50%",background:"#10B981"}} className="ping"/>
        <span style={{fontSize:10,color:"rgba(16,185,129,.8)",fontWeight:600}}>Supabase ✓</span>
      </div>

      {toast&&<div className="toast" style={{background:toast.tipo==="err"?"#ef4444":"#22c55e",color:"#fff"}}>{toast.msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
